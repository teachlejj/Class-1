<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Tracker</title>
</head>
<body>
    <h1>Game with Attendance Tracker</h1>

    <!-- Difficulty Selector -->
    <label for="difficulty">Select Difficulty:</label>
    <select id="difficulty">
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
        <option value="expert">Expert</option>
    </select>

    <button id="open-attendance-modal">Manage Attendance</button>

    <!-- Attendance Tracker Modal -->
    <div id="attendance-modal" style="display:none;">
        <h2>Attendance Tracker</h2>
        <div id="student-list"></div>
        <button id="save-attendance">Save Attendance</button>
    </div>

    <script>
        const attendanceData = JSON.parse(localStorage.getItem('attendanceData')) || {};
        const difficultyLevels = {
            easy: { gameTime: 30, verbList: ['run', 'jump'], questionComplexity: 1 },
            medium: { gameTime: 20, verbList: ['run', 'jump', 'swim'], questionComplexity: 2 },
            hard: { gameTime: 15, verbList: ['run', 'jump', 'swim', 'fly'], questionComplexity: 3 },
            expert: { gameTime: 10, verbList: ['run', 'jump', 'swim', 'fly', 'teleport'], questionComplexity: 4 }
        };

        document.getElementById('difficulty').addEventListener('change', function () {
            const selectedDifficulty = this.value;
            // Adjust game settings based on difficulty
            adjustGameSettings(difficultyLevels[selectedDifficulty]);
        });

        function adjustGameSettings(settings) {
            // Logic to adjust game time, verb lists, etc.
            console.log('Game settings adjusted:', settings);
        }

        document.getElementById('open-attendance-modal').addEventListener('click', function () {
            document.getElementById('attendance-modal').style.display = 'block';
        });

        document.getElementById('save-attendance').addEventListener('click', function () {
            // Save attendance data logic here
            localStorage.setItem('attendanceData', JSON.stringify(attendanceData));
            alert('Attendance saved!');
        });
    </script>
</body>
</html>
